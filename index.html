<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>BrawlClash</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;overflow:hidden;width:100vw;height:100vh;font-family:'Nunito',sans-serif;color:#fff;}
canvas{display:block;}

/* ── SCREENS ── */
.screen{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;}
.screen.on{display:flex;}

/* ── MENU ── */
#menuScreen{
  background:radial-gradient(ellipse at 50% 30%, #2d1060 0%, #0a0520 70%);
}
.logo{font-family:'Lilita One',cursive;font-size:58px;
  background:linear-gradient(170deg,#ffe234,#ff6b00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px #ff6b0088);letter-spacing:3px;margin-bottom:6px;}
.logo span{background:linear-gradient(170deg,#ff6bff,#7b2fff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{font-size:14px;opacity:.5;margin-bottom:30px;letter-spacing:2px;}

/* Brawler cards */
.pick-label{font-family:'Lilita One',cursive;font-size:20px;color:#ffe234;margin-bottom:12px;letter-spacing:1px;}
.brawlers-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:660px;margin-bottom:28px;}
.bc{
  width:90px;height:110px;border-radius:18px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  border:3px solid rgba(255,255,255,.15);
  background:linear-gradient(160deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
  transition:all .18s;position:relative;overflow:hidden;
}
.bc:hover,.bc.sel{transform:scale(1.1) translateY(-4px);border-color:#ffe234;
  box-shadow:0 8px 30px rgba(255,220,50,.35);}
.bc .emo{font-size:36px;}
.bc .bname{font-size:11px;font-weight:900;color:#fff;}
.bc .bstat{font-size:10px;color:#ffe234;opacity:.8;}
.bc .bar-r{position:absolute;top:0;left:0;right:0;height:4px;border-radius:18px 18px 0 0;}
.r-c{background:#aaa;}.r-r{background:#00c851;}.r-s{background:#1e90ff;}
.r-e{background:#9b2fff;}.r-l{background:linear-gradient(90deg,#ff6b00,#ffd700,#ff6b00);}

/* Mode buttons */
.mode-row{display:flex;gap:14px;margin-bottom:28px;}
.mode-btn{
  padding:14px 28px;border-radius:16px;border:3px solid transparent;
  cursor:pointer;font-family:'Lilita One',cursive;font-size:17px;
  transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.mode-btn .mico{font-size:28px;}
.mode-btn .mdesc{font-size:11px;font-weight:800;opacity:.75;}
.m-gem{background:linear-gradient(135deg,#1e4fa0,#0a2060);border-color:#1e90ff44;}
.m-ball{background:linear-gradient(135deg,#0a6030,#052010);border-color:#00c85144;}
.m-show{background:linear-gradient(135deg,#6a0000,#300000);border-color:#ff3d3d44;}
.mode-btn:hover,.mode-btn.sel{transform:scale(1.07);border-color:#ffe234;
  box-shadow:0 0 24px rgba(255,220,50,.4);}

.play-btn{
  font-family:'Lilita One',cursive;font-size:28px;
  background:linear-gradient(170deg,#ffe234,#ff6b00);
  border:none;border-radius:50px;padding:16px 70px;
  cursor:pointer;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.4);
  box-shadow:0 6px 0 #7a2d00,0 8px 24px rgba(255,107,0,.5);
  transition:all .15s;letter-spacing:2px;
}
.play-btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 #7a2d00,0 14px 30px rgba(255,107,0,.6);}
.play-btn:active{transform:translateY(2px);box-shadow:0 3px 0 #7a2d00;}

/* ── COUNTDOWN ── */
#cdScreen{background:rgba(0,0,0,.7);z-index:100;}
#cdNum{font-family:'Lilita One',cursive;font-size:140px;
  background:linear-gradient(170deg,#ffe234,#ff6b00);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:cdpop .7s ease-out;}
@keyframes cdpop{0%{transform:scale(2.5);opacity:0;}100%{transform:scale(1);opacity:1;}}

/* ── GAME ── */
#gameScreen{background:#000;padding:0;justify-content:flex-start;align-items:stretch;}
#gc{width:100%;flex:1;display:block;}

/* HUD */
.hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,.75),transparent);
  pointer-events:none;z-index:30;
}
.hud-team{display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-score{font-family:'Lilita One',cursive;font-size:38px;line-height:1;}
.blue-s{color:#5dade2;}.red-s{color:#e74c3c;}
.hud-label{font-size:10px;opacity:.65;letter-spacing:1px;}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:3px;}
.mode-tag{background:rgba(0,0,0,.5);border-radius:20px;padding:4px 14px;
  font-size:13px;font-weight:900;border:1px solid rgba(255,255,255,.15);}
.timer{font-family:'Lilita One',cursive;font-size:26px;}

/* player HUD bottom */
.phud{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 18px;
  background:linear-gradient(0deg,rgba(0,0,0,.8),transparent);
  display:flex;align-items:flex-end;justify-content:space-between;
  pointer-events:none;z-index:30;
}
.p-left{display:flex;flex-direction:column;gap:5px;}
.p-name{font-size:14px;font-weight:900;color:#ffe234;}
.hp-wrap{width:160px;height:14px;background:rgba(0,0,0,.5);border-radius:7px;
  border:2px solid rgba(255,255,255,.2);overflow:hidden;}
#hpBar{height:100%;background:linear-gradient(90deg,#00c851,#00ff66);border-radius:6px;transition:width .15s;}
.ammo-row{display:flex;gap:6px;}
.ap{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.15);
  border:2px solid rgba(255,255,255,.25);transition:all .1s;}
.ap.on{background:#ffe234;border-color:#fff;box-shadow:0 0 8px #ffe234;}

/* Kill feed */
#kf{position:absolute;top:68px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:30;pointer-events:none;}
.kfe{background:rgba(0,0,0,.7);border-radius:20px;padding:3px 12px;font-size:12px;
  font-weight:800;animation:kfin .25s ease;}
@keyframes kfin{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:none;}}

/* Notif */
#notif{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  font-family:'Lilita One',cursive;font-size:26px;
  background:rgba(0,0,0,.85);border-radius:20px;padding:12px 28px;
  z-index:50;pointer-events:none;text-align:center;border-top:3px solid #ffe234;
}
#notif.show{animation:npop 2.2s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes npop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0;}
  15%{transform:translate(-50%,-50%) scale(1.05);opacity:1;}
  80%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-50%) scale(.9);opacity:0;}
}

/* Minimap */
#mm{position:absolute;bottom:72px;right:14px;width:80px;height:80px;
  background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.2);
  border-radius:8px;overflow:hidden;z-index:30;}
#mmc{width:100%;height:100%;}

/* ── RESULT ── */
#resultScreen{background:radial-gradient(ellipse at center,#1a0a3e,#040210);}
.res-title{font-family:'Lilita One',cursive;font-size:64px;margin-bottom:18px;
  animation:rpop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes rpop{0%{transform:scale(0) rotate(-15deg);opacity:0;}100%{transform:none;opacity:1;}}
.victory{background:linear-gradient(170deg,#ffe234,#ff6b00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.defeat{background:linear-gradient(170deg,#aaa,#444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.res-card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);
  border-radius:20px;padding:20px 36px;display:flex;flex-direction:column;gap:12px;
  width:90%;max-width:420px;margin-bottom:20px;}
.res-row{display:flex;justify-content:space-between;align-items:center;font-size:15px;}
.res-row span:last-child{font-weight:900;color:#ffe234;font-size:18px;}
.trophy-row{font-family:'Lilita One',cursive;font-size:28px;margin-bottom:16px;}
.tg{color:#ffd700;}.tl{color:#888;}
.menu-btn{font-family:'Lilita One',cursive;font-size:20px;background:linear-gradient(170deg,#7b2fbe,#4a0f8a);
  border:none;border-radius:50px;padding:14px 50px;cursor:pointer;color:#fff;
  box-shadow:0 6px 0 #2a0060;transition:all .15s;letter-spacing:1px;}
.menu-btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>

<!-- MENU -->
<div class="screen on" id="menuScreen">
  <div class="logo">Brawl<span>Clash</span></div>
  <div class="subtitle">TÜRK BRAWL STARS KLonu</div>

  <div class="pick-label">⚡ BRAWLER SEÇ</div>
  <div class="brawlers-row" id="bGrid"></div>

  <div class="pick-label">🎮 MOD SEÇ</div>
  <div class="mode-row">
    <div class="mode-btn m-gem sel" data-mode="gem" onclick="pickMode(this)">
      <span class="mico">💎</span>Gem Grab
      <span class="mdesc">10 gem → Kazan · 3dk timer</span>
    </div>
    <div class="mode-btn m-ball" data-mode="ball" onclick="pickMode(this)">
      <span class="mico">⚽</span>Brawl Ball
      <span class="mdesc">2 Gol → Kazan · 3dk timer</span>
    </div>
    <div class="mode-btn m-show" data-mode="show" onclick="pickMode(this)">
      <span class="mico">💀</span>Showdown
      <span class="mdesc">Son brawler → Kazan</span>
    </div>
  </div>

  <button class="play-btn" onclick="startGame()">▶ OYNA</button>
</div>

<!-- COUNTDOWN -->
<div class="screen" id="cdScreen">
  <div id="cdNum">3</div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
  <div class="hud">
    <div class="hud-team">
      <div class="hud-label">MAVİ TAKIM</div>
      <div class="hud-score blue-s" id="sBlue">0</div>
    </div>
    <div class="hud-mid">
      <div class="mode-tag" id="modeTag">💎 GEM GRAB</div>
      <div class="timer" id="timer">3:00</div>
    </div>
    <div class="hud-team">
      <div class="hud-label">KIRMIZI TAKIM</div>
      <div class="hud-score red-s" id="sRed">0</div>
    </div>
  </div>

  <canvas id="gc"></canvas>

  <div id="kf"></div>
  <div id="mm"><canvas id="mmc"></canvas></div>
  <div id="notif"></div>

  <div class="phud">
    <div class="p-left">
      <div class="p-name" id="pName">—</div>
      <div class="hp-wrap"><div id="hpBar"></div></div>
    </div>
    <div class="ammo-row" id="ammoRow">
      <div class="ap on" id="a0"></div>
      <div class="ap on" id="a1"></div>
      <div class="ap on" id="a2"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="res-title" id="rTitle">ZAFERSİN! 🏆</div>
  <div class="res-card">
    <div class="res-row"><span>Hasar</span><span id="rDmg">0</span></div>
    <div class="res-row"><span>Öldürme</span><span id="rKills">0</span></div>
    <div class="res-row"><span>Ölüm</span><span id="rDeaths">0</span></div>
    <div class="res-row"><span>Mod</span><span id="rMode">—</span></div>
  </div>
  <div class="trophy-row">🏆 <span id="rTrophy" class="tg">+30</span></div>
  <button class="menu-btn" onclick="toMenu()">Ana Menü</button>
</div>

<script>
// ═══════════════════════════════════════════════
//   BRAWLCLASH  –  Full Game Engine
// ═══════════════════════════════════════════════

const BRAWLERS=[
  {name:'Shelly', e:'🔫', col:'#c0392b', hp:3400, dmg:340, spd:2.9, shot:'scatter', r:'r-c'},
  {name:'Nita',   e:'🐻', col:'#8e44ad', hp:3200, dmg:380, spd:2.7, shot:'single',  r:'r-r'},
  {name:'Colt',   e:'🤠', col:'#2980b9', hp:2800, dmg:280, spd:3.3, shot:'burst',   r:'r-r'},
  {name:'Bull',   e:'🐂', col:'#d35400', hp:5000, dmg:480, spd:2.4, shot:'scatter', r:'r-r'},
  {name:'Jessie', e:'⚡', col:'#f39c12', hp:2800, dmg:300, spd:2.9, shot:'bounce',  r:'r-s'},
  {name:'Brock',  e:'🚀', col:'#16a085', hp:2800, dmg:700, spd:2.7, shot:'rocket',  r:'r-s'},
  {name:'Dyna',   e:'💣', col:'#e67e22', hp:2400, dmg:560, spd:3.0, shot:'lob',     r:'r-s'},
  {name:'Bo',     e:'🏹', col:'#27ae60', hp:3400, dmg:380, spd:2.9, shot:'triple',  r:'r-e'},
  {name:'Spike',  e:'🌵', col:'#9b59b6', hp:2800, dmg:640, spd:2.7, shot:'spread',  r:'r-l'},
  {name:'Crow',   e:'🐦', col:'#2c3e50', hp:2400, dmg:320, spd:3.6, shot:'triple',  r:'r-l'},
];

const BOT_NAMES=['KralAvcı','YıldızBrawl','GemKıral','BombaHan','ZekinBot','VurdumBot','SavaşTürkü','HakanBot'];

let sel=0, mode='gem';
let gs=null, raf=null, timerInt=null;
let gameTime=180, pStats={dmg:0,kills:0,deaths:0};
const keys={};
let mx=0,my=0;

// ── CANVAS ──
const cv=document.getElementById('gc');
const cx=cv.getContext('2d');
const mc=document.getElementById('mmc');
const mx2=mc.getContext('2d');

// ── MENU BUILD ──
(function buildMenu(){
  const g=document.getElementById('bGrid');
  BRAWLERS.forEach((b,i)=>{
    const d=document.createElement('div');
    d.className='bc'+(i===0?' sel':'');
    d.innerHTML=`<div class="bar-r ${b.r}"></div><div class="emo">${b.e}</div><div class="bname">${b.name}</div><div class="bstat">❤${(b.hp/100).toFixed(0)} ⚡${b.spd.toFixed(1)}</div>`;
    d.onclick=()=>{sel=i;document.querySelectorAll('.bc').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');};
    g.appendChild(d);
  });
})();

function pickMode(el){
  mode=el.dataset.mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
}

// ── SHOW SCREEN ──
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('on');s.style.display='';});
  const el=document.getElementById(id);
  el.style.display='flex';
  el.classList.add('on');
}

// ── MAP ──
const TW=36, MW=44, MH=32;

function buildMap(m){
  const map=[];
  for(let y=0;y<MH;y++){map[y]=[];
    for(let x=0;x<MW;x++){
      if(x===0||y===0||x===MW-1||y===MH-1){map[y][x]=2;continue;}
      const r=Math.random();
      map[y][x]=r<.07?1:r<.14?2:0;
    }
  }
  // clear spawns
  for(let dy=-1;dy<=2;dy++)for(let dx=-1;dx<=2;dx++){
    if(map[3+dy]&&map[3+dy][3+dx]!==undefined)map[3+dy][3+dx]=0;
    if(map[MH-4+dy]&&map[MH-4+dy][MW-4+dx]!==undefined)map[MH-4+dy][MW-4+dx]=0;
  }
  // clear center
  for(let dy=-3;dy<=3;dy++)for(let dx=-4;dx<=4;dx++){
    const ty=Math.floor(MH/2)+dy,tx=Math.floor(MW/2)+dx;
    if(map[ty])map[ty][tx]=0;
  }
  // gem grab mine tunnels
  if(m==='gem'){
    for(let x=4;x<MW-4;x++){map[Math.floor(MH/2)][x]=0;}
  }
  // brawl ball corridors + goals
  if(m==='ball'){
    for(let x=6;x<MW-6;x++){
      map[3][x]=0;map[MH-4][x]=0;
    }
    for(let y=3;y<MH-3;y++){
      map[y][5]=0;map[y][MW-6]=0;
    }
  }
  return map;
}

// ── ENTITY FACTORY ──
function makeEntity(id,name,e,col,bIdx,team,x,y,isP){
  const b=BRAWLERS[bIdx];
  return{id,name,e,col,bIdx,team,
    x:x*TW+TW/2, y:y*TW+TW/2,
    hp:b.hp, mhp:b.hp, ammo:3, maxAmmo:3, ammoT:0,
    spd:b.spd*TW/14,
    shootCD:0, angle:0,
    isAlive:true, isPlayer:isP,
    kills:0, gems:0,
    aiT:0, aiTx:x*TW, aiTy:y*TW,
    hasBall:false,
  };
}

// ── START GAME ──
function startGame(){
  show('cdScreen');
  let c=3;
  const el=document.getElementById('cdNum');
  el.textContent='3';
  const iv=setInterval(()=>{
    c--;
    if(c>0){
      el.textContent=c;
      el.style.animation='none';void el.offsetWidth;el.style.animation='cdpop .7s ease-out';
    } else {
      clearInterval(iv);
      el.textContent='BAŞLA!';
      el.style.animation='none';void el.offsetWidth;el.style.animation='cdpop .7s ease-out';
      setTimeout(launchGame,600);
    }
  },900);
}

function launchGame(){
  show('gameScreen');
  resizeCv();

  const map=buildMap(mode);
  const b=BRAWLERS[sel];
  const player=makeEntity(0,'Sen',b.e,b.col,sel,0,3,3,true);

  const bots=[];
  const count=mode==='show'?9:5; // showdown=9 bots, others=5 (3v3 feeling)
  for(let i=1;i<=count;i++){
    const bi=Math.floor(Math.random()*BRAWLERS.length);
    const team=i<=Math.floor(count/2)?0:1;
    const spx=team===0?3+Math.floor(Math.random()*2):MW-5+Math.floor(Math.random()*2);
    const spy=team===0?3+Math.floor(Math.random()*2):MH-5+Math.floor(Math.random()*2);
    bots.push(makeEntity(i,BOT_NAMES[(i-1)%BOT_NAMES.length],BRAWLERS[bi].e,BRAWLERS[bi].col,bi,team,spx,spy,false));
  }

  // Mode state
  let gems=[],ball=null;
  if(mode==='gem'){
    for(let i=0;i<6;i++) spawnGem(gems,map);
  }
  if(mode==='ball'){
    ball={x:MW/2*TW,y:MH/2*TW,vx:0,vy:0,carrier:null};
  }

  pStats={dmg:0,kills:0,deaths:0};
  gameTime=mode==='show'?9999:180;

  gs={map,player,bots,gems,ball,projs:[],parts:[],
    score:[0,0],running:true,won:null,mode,
    gemSpawnT:0};

  // mode label
  const labels={gem:'💎 GEM GRAB',ball:'⚽ BRAWL BALL',show:'💀 SHOWDOWN'};
  document.getElementById('modeTag').textContent=labels[mode];
  document.getElementById('pName').textContent=b.name;
  updateHpBar();updateAmmoUI();updateScore();

  startTimer();
  if(raf)cancelAnimationFrame(raf);
  let last=performance.now();
  function loop(now){
    if(!gs||!gs.running){return;}
    const dt=Math.min((now-last)/16.67,3);last=now;
    update(dt);render();
    raf=requestAnimationFrame(loop);
  }
  raf=requestAnimationFrame(loop);
}

function spawnGem(gems,map){
  const cx=Math.floor(MW/2),cy=Math.floor(MH/2);
  let tries=0,x,y;
  do{x=cx+(Math.floor(Math.random()*10)-5);y=cy+(Math.floor(Math.random()*8)-4);tries++;}
  while(tries<30&&map[y]&&map[y][x]!==0);
  gems.push({x:x*TW+TW/2,y:y*TW+TW/2,alive:true,t:0});
}

// ── TIMER ──
function startTimer(){
  if(timerInt)clearInterval(timerInt);
  if(mode==='show'){document.getElementById('timer').textContent='∞';return;}
  timerInt=setInterval(()=>{
    if(!gs||!gs.running)return;
    if(gameTime>0)gameTime--;
    const m=Math.floor(gameTime/60),s=gameTime%60;
    document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    if(gameTime<=0){
      // Timer bitti ama kazanma koşulu kontrol et
      const s0=gs.score[0],s1=gs.score[1];
      if(s0!==s1) endGame(s0>s1);
      else{
        // Beraberlik: süre uzat
        showNotif('⏰ BERABERE! Süre uzatıldı!','#ffe234');
        gameTime=60; // 1 dakika daha
      }
    }
  },1000);
}

// ── INPUT ──
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.preventDefault&&['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())&&e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
document.getElementById('gc').addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;
});
document.getElementById('gc').addEventListener('click',()=>{if(gs&&!gs._cd)doShoot();});
document.getElementById('gc').addEventListener('contextmenu',e=>e.preventDefault());

// ── UPDATE ──
function update(dt){
  const g=gs;if(!g.running)return;
  const p=g.player;

  // Player move
  if(p.isAlive){
    let dx=0,dy=0;
    if(keys['w']||keys['arrowup'])dy=-1;
    if(keys['s']||keys['arrowdown'])dy+=1;
    if(keys['a']||keys['arrowleft'])dx=-1;
    if(keys['d']||keys['arrowright'])dx+=1;
    if(dx||dy){
      const l=Math.sqrt(dx*dx+dy*dy);dx/=l;dy/=l;
      moveEntity(p,dx*p.spd*dt,dy*p.spd*dt);
    }
    const camX=p.x-cv.width/2,camY=p.y-cv.height/2;
    p.angle=Math.atan2(my+camY-p.y,mx+camX-p.x);
    if(p.shootCD>0)p.shootCD-=dt;
    tickAmmo(p,dt);
  }

  // Bots AI
  g.bots.forEach(bot=>{
    if(!bot.isAlive)return;
    bot.aiT-=dt;

    const all=[p,...g.bots];
    const enemies=all.filter(e=>e.isAlive&&e.team!==bot.team);
    let tgt=null,md=1e9;
    enemies.forEach(e=>{const d=d2(bot,e);if(d<md){md=d;tgt=e;}});

    // Gem logic: go grab gems
    if(g.mode==='gem'&&g.gems.length>0){
      const nearGem=g.gems.filter(gm=>gm.alive).sort((a,b)=>d2(bot,a)-d2(bot,b))[0];
      if(nearGem&&(!tgt||d2(bot,nearGem)<d2(bot,tgt)*0.6)){
        bot.aiTx=nearGem.x;bot.aiTy=nearGem.y;
      } else if(tgt){
        setAiTarget(bot,tgt,md);
      }
    } else if(g.mode==='ball'&&g.ball){
      const ball=g.ball;
      if(!ball.carrier){bot.aiTx=ball.x;bot.aiTy=ball.y;}
      else if(ball.carrier===bot){
        // carry to enemy goal
        bot.aiTx=bot.team===0?MW*TW/2:MW*TW/2;
        bot.aiTy=bot.team===0?0:MH*TW;
      } else if(tgt){setAiTarget(bot,tgt,md);}
    } else if(tgt){
      setAiTarget(bot,tgt,md);
    } else {
      if(bot.aiT<0){
        bot.aiT=30+Math.random()*40;
        bot.aiTx=TW*2+Math.random()*(MW-4)*TW;
        bot.aiTy=TW*2+Math.random()*(MH-4)*TW;
      }
    }

    // Move toward target
    let bx=bot.aiTx-bot.x,by=bot.aiTy-bot.y;
    const bl=Math.sqrt(bx*bx+by*by);
    if(bl>6){bx/=bl;by/=bl;moveEntity(bot,bx*bot.spd*dt*0.85,by*bot.spd*dt*0.85);}

    // Aim & shoot
    if(tgt){
      bot.angle=Math.atan2(tgt.y-bot.y,tgt.x-bot.x);
      if(bot.shootCD<=0&&bot.ammo>0&&Math.sqrt(d2(bot,tgt))<TW*9){
        fireProjectiles(bot);bot.ammo--;bot.shootCD=25+Math.random()*15;
        if(bot.ammo<bot.maxAmmo)bot.ammoT=0;
      }
    }
    if(bot.shootCD>0)bot.shootCD-=dt;
    tickAmmo(bot,dt);
  });

  // Projectiles
  for(let i=g.projs.length-1;i>=0;i--){
    const pr=g.projs[i];
    pr.x+=pr.vx*dt;pr.y+=pr.vy*dt;
    pr.dist+=Math.hypot(pr.vx,pr.vy)*dt;
    if(pr.dist>pr.range||isWall(pr.x,pr.y)){
      if(pr.type==='lob'||pr.type==='rocket')explodeAt(pr.x,pr.y,pr);
      g.projs.splice(i,1);continue;
    }
    let hit=false;
    const targets=[p,...g.bots].filter(e=>e.isAlive&&e.team!==pr.team&&e.id!==pr.oid);
    for(const t of targets){
      if(Math.abs(pr.x-t.x)<22&&Math.abs(pr.y-t.y)<22){
        dealDmg(pr.oid,t,pr.dmg);
        spawnHit(pr.x,pr.y,pr.col);
        if(pr.type==='lob'||pr.type==='rocket')explodeAt(pr.x,pr.y,pr);
        g.projs.splice(i,1);hit=true;break;
      }
    }
    if(hit)continue;
  }

  // Gems
  if(g.mode==='gem'){
    g.gems.forEach(gem=>{
      if(!gem.alive)return;
      gem.t+=dt;
      const all=[p,...g.bots].filter(e=>e.isAlive);
      all.forEach(e=>{
        if(Math.abs(gem.x-e.x)<26&&Math.abs(gem.y-e.y)<26){
          gem.alive=false;e.gems++;
          g.score[e.team]++;updateScore();
          if(e.isPlayer)showNotif('💎 Gem Aldın! ('+e.gems+')',  '#1e90ff');
          checkWin();
        }
      });
    });
    g.gemSpawnT+=dt;
    if(g.gemSpawnT>200){g.gemSpawnT=0;spawnGem(g.gems,g.map);}
  }

  // Brawl Ball
  if(g.mode==='ball'&&g.ball){
    const ball=g.ball;
    if(ball.carrier){
      ball.x=ball.carrier.x;ball.y=ball.carrier.y;
    } else {
      ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;
      ball.vx*=Math.pow(.93,dt);ball.vy*=Math.pow(.93,dt);
      if(isWall(ball.x,ball.y)){ball.vx*=-.7;ball.vy*=-.7;}
      ball.x=Math.max(TW,Math.min((MW-1)*TW,ball.x));
      ball.y=Math.max(TW,Math.min((MH-1)*TW,ball.y));
      const all=[p,...g.bots].filter(e=>e.isAlive);
      all.forEach(e=>{if(Math.hypot(ball.x-e.x,ball.y-e.y)<28&&!ball.carrier)ball.carrier=e;});
    }
    // Kick on shoot collision (projectile handled separately)
    if(ball.carrier){
      // Kick toward goal when near goal line
      const gly_top=TW*3,gly_bot=(MH-3)*TW;
      const glx0=MW*TW/2-70,glx1=MW*TW/2+70;
      if(ball.y<gly_top&&ball.x>glx0&&ball.x<glx1){
        // Goal for team 1 (red)
        g.score[1]++;updateScore();
        showNotif('⚽ GOL! Kırmızı Takım +1','#e74c3c');
        resetBall();checkWin();
      }
      if(ball.y>gly_bot&&ball.x>glx0&&ball.x<glx1){
        g.score[0]++;updateScore();
        showNotif('⚽ GOL! Mavi Takım +1','#5dade2');
        resetBall();checkWin();
      }
    }
  }

  // Particles
  for(let i=g.parts.length-1;i>=0;i--){
    const pt=g.parts[i];
    pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.life-=dt;
    if(pt.life<=0)g.parts.splice(i,1);
  }

  updateHpBar();drawMinimap();
}

function setAiTarget(bot,tgt,md){
  const optD=TW*(5+Math.random()*3);
  const dist=Math.sqrt(md);
  if(dist>optD+20){bot.aiTx=tgt.x+(Math.random()-.5)*TW*2;bot.aiTy=tgt.y+(Math.random()-.5)*TW*2;}
  else if(dist<TW*3){bot.aiTx=bot.x+(bot.x-tgt.x)*.8;bot.aiTy=bot.y+(bot.y-tgt.y)*.8;}
}

function moveEntity(e,dx,dy){
  const nx=e.x+dx,ny=e.y+dy;
  if(!isWall(nx,e.y))e.x=nx;
  if(!isWall(e.x,ny))e.y=ny;
  e.x=Math.max(TW+4,Math.min((MW-1)*TW-4,e.x));
  e.y=Math.max(TW+4,Math.min((MH-1)*TW-4,e.y));
  // Ball kick
  if(gs.mode==='ball'&&gs.ball&&!gs.ball.carrier){
    const ball=gs.ball;
    const dd=Math.hypot(ball.x-e.x,ball.y-e.y);
    if(dd<24){
      const a=Math.atan2(ball.y-e.y,ball.x-e.x);
      ball.vx=Math.cos(a)*6;ball.vy=Math.sin(a)*6;ball.carrier=null;
    }
  }
}

function tickAmmo(e,dt){
  if(e.ammo<e.maxAmmo){e.ammoT+=dt;if(e.ammoT>=65){e.ammo++;e.ammoT=0;if(e.isPlayer)updateAmmoUI();}}
}

function isWall(wx,wy){
  const tx=Math.floor(wx/TW),ty=Math.floor(wy/TW);
  if(tx<0||ty<0||tx>=MW||ty>=MH)return true;
  return gs.map[ty][tx]===2;
}

function d2(a,b){return(a.x-b.x)**2+(a.y-b.y)**2;}

// ── SHOOT ──
function doShoot(){
  const p=gs.player;
  if(!p.isAlive||p.ammo<=0||p.shootCooldown>0)return;
  // Kick ball if carrying
  if(gs.mode==='ball'&&gs.ball&&gs.ball.carrier===p){
    const a=p.angle;
    gs.ball.carrier=null;
    gs.ball.vx=Math.cos(a)*9;gs.ball.vy=Math.sin(a)*9;
    return;
  }
  fireProjectiles(p);
  p.ammo--;p.shootCD=18;
  if(p.ammo<p.maxAmmo)p.ammoT=0;
  updateAmmoUI();
}

function fireProjectiles(shooter){
  const b=BRAWLERS[shooter.bIdx];
  const a=shooter.angle,spd=7.5;
  const mk=(a,spd,dmg,range,type,col)=>{
    gs.projs.push({x:shooter.x,y:shooter.y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      oid:shooter.id,team:shooter.team,dmg,range,dist:0,type,col});
  };
  switch(b.shot){
    case'scatter':for(let i=-2;i<=2;i++)mk(a+i*.13,spd,b.dmg*.38,TW*6,'bullet',b.col);break;
    case'burst':  for(let i=-1;i<=1;i++)mk(a+i*.07,spd+1,b.dmg*.45,TW*9,'bullet',b.col);break;
    case'triple': for(let i=-1;i<=1;i++)mk(a+i*.15,spd,b.dmg*.55,TW*8,'bullet',b.col);break;
    case'rocket': mk(a,5.5,b.dmg,TW*12,'rocket','#e74c3c');break;
    case'lob':    mk(a,4,b.dmg,TW*8,'lob','#333');break;
    case'spread': for(let i=0;i<6;i++)mk((i/6)*Math.PI*2,4,b.dmg*.55,TW*7,'spike','#9b59b6');break;
    case'bounce': mk(a,spd,b.dmg,TW*10,'bullet',b.col);break;
    default:      mk(a,spd,b.dmg,TW*9,'bullet',b.col);break;
  }
}

// ── DAMAGE ──
function dealDmg(oid,target,dmg){
  target.hp-=dmg;
  if(target.isPlayer)pStats.dmg+=dmg;
  spawnDmgNum(target.x,target.y);
  if(target.hp<=0){
    target.hp=0;target.isAlive=false;
    addKillFeed(oid,target);
    if(target.isPlayer){
      pStats.deaths++;
      showNotif('💀 Öldün! 3sn sonra doğuyorsun…','#e74c3c');
      setTimeout(()=>{if(gs&&gs.running){target.x=3.5*TW;target.y=3.5*TW;target.hp=target.mhp;target.ammo=3;target.isAlive=true;updateAmmoUI();}},3000);
    } else {
      const killer=oid===0?gs.player:gs.bots.find(b=>b.id===oid);
      if(killer){killer.kills++;if(oid===0){pStats.kills++;showNotif('💥 Rakip Yok Edildi!','#ffe234');}}
      if(target.gems>0&&gs.mode==='gem'){
        for(let i=0;i<target.gems;i++)gs.gems.push({x:target.x+(Math.random()-.5)*40,y:target.y+(Math.random()-.5)*40,alive:true,t:0});
        gs.score[target.team]=Math.max(0,gs.score[target.team]-target.gems);
        target.gems=0;updateScore();
      }
      if(gs.mode==='ball'&&gs.ball&&gs.ball.carrier===target){
        gs.ball.carrier=null;gs.ball.vx=(Math.random()-.5)*5;gs.ball.vy=(Math.random()-.5)*5;
      }
      if(gs.mode==='show'){
        const alive=gs.bots.filter(b=>b.isAlive);
        if(alive.length===0||(alive.length===1&&!gs.player.isAlive))endGame(false);
        else if(!alive.some(b=>b.team!==0)&&gs.player.isAlive)endGame(true);
      }
      setTimeout(()=>{if(gs&&gs.running)respawnBot(target);},5000+Math.random()*2000);
    }
  }
}

function respawnBot(bot){
  bot.x=bot.team===0?3.5*TW+(Math.random()*2-1)*TW:((MW-4.5)*TW+(Math.random()*2-1)*TW);
  bot.y=bot.team===0?3.5*TW+(Math.random()*2-1)*TW:((MH-4.5)*TW+(Math.random()*2-1)*TW);
  bot.hp=bot.mhp;bot.ammo=3;bot.isAlive=true;
}

function resetBall(){
  gs.ball.x=MW/2*TW;gs.ball.y=MH/2*TW;gs.ball.vx=0;gs.ball.vy=0;gs.ball.carrier=null;
}

function explodeAt(x,y,pr){
  const r=TW*2.5;
  [gs.player,...gs.bots].filter(e=>e.isAlive&&e.team!==pr.team).forEach(e=>{
    if(Math.hypot(e.x-x,e.y-y)<r)dealDmg(pr.oid,e,pr.dmg*.7);
  });
  for(let i=0;i<14;i++){
    const a=(i/14)*Math.PI*2,sp=2+Math.random()*4;
    gs.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      col:['#ff6b00','#ffd700','#fff','#ff3d3d'][i%4],sz:3+Math.random()*4,life:22,ml:22});
  }
}

// ── WIN CHECK ──
function checkWin(){
  if(gs.mode==='gem'){if(gs.score[0]>=10)endGame(true);else if(gs.score[1]>=10)endGame(false);}
  if(gs.mode==='ball'){if(gs.score[0]>=2)endGame(true);else if(gs.score[1]>=2)endGame(false);}
}

function endGame(playerWon){
  if(!gs||!gs.running)return;
  gs.running=false;
  if(timerInt)clearInterval(timerInt);
  if(raf)cancelAnimationFrame(raf);
  setTimeout(()=>showResult(playerWon),1000);
}

function showResult(won){
  show('resultScreen');
  document.getElementById('rTitle').textContent=won?'🏆 ZAFERSİN!':'💀 YENİLDİN';
  document.getElementById('rTitle').className='res-title '+(won?'victory':'defeat');
  document.getElementById('rDmg').textContent=Math.round(pStats.dmg).toLocaleString();
  document.getElementById('rKills').textContent=pStats.kills;
  document.getElementById('rDeaths').textContent=pStats.deaths;
  document.getElementById('rMode').textContent={gem:'Gem Grab',ball:'Brawl Ball',show:'Showdown'}[mode];
  const delta=won?30:-15;
  const el=document.getElementById('rTrophy');
  el.textContent=(delta>0?'+':'')+delta+' Kupa';
  el.className=delta>0?'tg':'tl';
}

function toMenu(){gs=null;show('menuScreen');}

// ── RENDER ──
function resizeCv(){
  const gs2=document.getElementById('gameScreen');
  cv.width=gs2.clientWidth;cv.height=gs2.clientHeight;
  mc.width=80;mc.height=80;
}
window.addEventListener('resize',()=>{if(gs)resizeCv();});

const TCOLS={0:'#2e5e12',1:'#274f0f',2:'#252525',3:'#8b3a00'};

function render(){
  if(!gs)return;
  const p=gs.player;
  cx.clearRect(0,0,cv.width,cv.height);
  const camX=Math.round(p.x-cv.width/2);
  const camY=Math.round(p.y-cv.height/2);
  cx.save();cx.translate(-camX,-camY);

  // MAP
  const x0=Math.max(0,Math.floor(camX/TW)),y0=Math.max(0,Math.floor(camY/TW));
  const x1=Math.min(MW,Math.ceil((camX+cv.width)/TW)+1);
  const y1=Math.min(MH,Math.ceil((camY+cv.height)/TW)+1);
  for(let ty=y0;ty<y1;ty++)for(let tx=x0;tx<x1;tx++){
    const t=gs.map[ty][tx];
    const px=tx*TW,py=ty*TW;
    if(t===0){
      cx.fillStyle=(tx+ty)%2===0?'#3a7a1a':'#336e15';
      cx.fillRect(px,py,TW,TW);
    } else if(t===1){
      cx.fillStyle='#3a7a1a';cx.fillRect(px,py,TW,TW);
      cx.fillStyle='#7a5200';cx.fillRect(px+2,py+4,TW-4,TW-6);
      cx.fillStyle='#a07000';cx.fillRect(px+4,py+2,TW-8,8);
      cx.strokeStyle='#3a2000';cx.lineWidth=1.5;cx.strokeRect(px+2,py+4,TW-4,TW-6);
    } else {
      cx.fillStyle='#2a2a2a';cx.fillRect(px,py,TW,TW);
      cx.fillStyle='#444';cx.fillRect(px+2,py+2,TW-4,TW/2-2);
      cx.strokeStyle='#1a1a1a';cx.lineWidth=1;cx.strokeRect(px,py,TW,TW);
    }
  }

  // BALL GOALS
  if(gs.mode==='ball'){
    const gx0=MW*TW/2-70,gx1=MW*TW/2+70;
    cx.fillStyle='rgba(90,220,90,.3)';
    cx.fillRect(gx0,TW*2,140,TW*1.2);
    cx.fillRect(gx0,(MH-3)*TW,140,TW*1.2);
    cx.strokeStyle='rgba(90,220,90,.7)';cx.lineWidth=3;
    cx.strokeRect(gx0,TW*2,140,TW*1.2);
    cx.strokeRect(gx0,(MH-3)*TW,140,TW*1.2);
    cx.fillStyle='rgba(255,255,255,.5)';cx.font='bold 18px sans-serif';cx.textAlign='center';
    cx.fillText('🥅',MW*TW/2,TW*2.8);
    cx.fillText('🥅',MW*TW/2,(MH-2.2)*TW);
  }

  // GEM AREA indicator
  if(gs.mode==='gem'){
    cx.fillStyle='rgba(30,144,255,.08)';
    cx.fillRect(MW*TW/2-TW*5,MH*TW/2-TW*4,TW*10,TW*8);
  }

  // PARTICLES
  gs.parts.forEach(pt=>{
    cx.globalAlpha=pt.life/pt.ml;
    cx.fillStyle=pt.col;
    cx.beginPath();cx.arc(pt.x,pt.y,pt.sz,0,Math.PI*2);cx.fill();
  });cx.globalAlpha=1;

  // PROJECTILES
  gs.projs.forEach(pr=>{
    cx.save();
    if(pr.type==='rocket'){
      cx.fillStyle='#e74c3c';cx.beginPath();cx.arc(pr.x,pr.y,7,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ff6b00';cx.beginPath();cx.arc(pr.x,pr.y,4,0,Math.PI*2);cx.fill();
    } else if(pr.type==='lob'){
      cx.fillStyle='#333';cx.beginPath();cx.arc(pr.x,pr.y,8,0,Math.PI*2);cx.fill();
      cx.fillStyle='#e74c3c';cx.beginPath();cx.arc(pr.x-2,pr.y-4,2.5,0,Math.PI*2);cx.fill();
    } else if(pr.type==='spike'){
      cx.fillStyle='#9b59b6';
      cx.beginPath();cx.moveTo(pr.x,pr.y-6);cx.lineTo(pr.x+3,pr.y+4);cx.lineTo(pr.x-3,pr.y+4);cx.closePath();cx.fill();
    } else {
      cx.strokeStyle=pr.col;cx.lineWidth=3;cx.lineCap='round';
      cx.beginPath();cx.moveTo(pr.x-pr.vx*3,pr.y-pr.vy*3);cx.lineTo(pr.x+pr.vx*1.5,pr.y+pr.vy*1.5);cx.stroke();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(pr.x,pr.y,2.5,0,Math.PI*2);cx.fill();
    }
    cx.restore();
  });

  // GEMS
  if(gs.mode==='gem'){
    gs.gems.forEach(gem=>{
      if(!gem.alive)return;
      const bob=Math.sin(Date.now()*.003+gem.t)*.5;
      cx.save();
      cx.shadowBlur=12;cx.shadowColor='#1e90ff';
      cx.fillStyle='#4daaff';
      cx.beginPath();
      cx.moveTo(gem.x,gem.y-11+bob);cx.lineTo(gem.x+8,gem.y+bob);
      cx.lineTo(gem.x,gem.y+11+bob);cx.lineTo(gem.x-8,gem.y+bob);cx.closePath();cx.fill();
      cx.fillStyle='rgba(255,255,255,.35)';
      cx.beginPath();cx.moveTo(gem.x-2,gem.y-8+bob);cx.lineTo(gem.x+5,gem.y+bob);cx.lineTo(gem.x-2,gem.y-1+bob);cx.closePath();cx.fill();
      cx.restore();
    });
  }

  // BALL
  if(gs.mode==='ball'&&gs.ball&&!gs.ball.carrier){
    const ball=gs.ball;
    cx.save();
    cx.shadowBlur=14;cx.shadowColor='rgba(255,255,255,.5)';
    cx.fillStyle='#fff';cx.beginPath();cx.arc(ball.x,ball.y,13,0,Math.PI*2);cx.fill();
    cx.fillStyle='#333';cx.font='14px serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('⚽',ball.x,ball.y+1);
    cx.restore();
  }

  // ENTITIES
  [...gs.bots,...(gs.player.isAlive?[gs.player]:[])].filter(e=>e.isAlive).forEach(e=>drawE(e,e===gs.player));

  cx.restore();
}

function drawE(e,isP){
  const sz=20;
  // Shadow
  cx.fillStyle='rgba(0,0,0,.3)';
  cx.beginPath();cx.ellipse(e.x,e.y+sz*.85,sz*.65,sz*.28,0,0,Math.PI*2);cx.fill();
  // Body
  const g2=cx.createRadialGradient(e.x-sz*.3,e.y-sz*.3,0,e.x,e.y,sz);
  g2.addColorStop(0,lighten(e.col,55));g2.addColorStop(1,e.col);
  cx.fillStyle=g2;cx.beginPath();cx.arc(e.x,e.y,sz,0,Math.PI*2);cx.fill();
  // Ring
  cx.strokeStyle=isP?'#ffe234':(e.team===0?'#5dade2':'#e74c3c');
  cx.lineWidth=isP?3.5:2.5;cx.stroke();
  // Emoji
  cx.font=`${sz+2}px serif`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(e.e,e.x,e.y+1);
  // Gun
  const ga=e.angle,gd=sz+7;
  cx.strokeStyle='#444';cx.lineWidth=5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(e.x+Math.cos(ga)*sz*.5,e.y+Math.sin(ga)*sz*.5);
  cx.lineTo(e.x+Math.cos(ga)*gd,e.y+Math.sin(ga)*gd);cx.stroke();
  cx.strokeStyle='#888';cx.lineWidth=3;cx.stroke();
  // Ball indicator
  if(gs.mode==='ball'&&gs.ball&&gs.ball.carrier===e){
    cx.font='16px serif';cx.textAlign='center';cx.fillText('⚽',e.x,e.y-sz-8);
  }
  // HP bar
  const bw=44,bh=6,bx=e.x-bw/2,by=e.y-sz-15;
  cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(bx-1,by-1,bw+2,bh+2);
  const hr=e.hp/e.mhp;
  cx.fillStyle=hr>.5?'#00c851':hr>.25?'#ffb900':'#ff3d3d';
  cx.fillRect(bx,by,bw*hr,bh);
  // Name
  cx.font='bold 10px Nunito,sans-serif';cx.textAlign='center';
  const nw=cx.measureText(e.name).width+8;
  cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(e.x-nw/2,e.y-sz-28,nw,13);
  cx.fillStyle=isP?'#ffe234':'#fff';
  cx.fillText(e.name,e.x,e.y-sz-18);
  // Gems
  if(e.gems>0){
    cx.fillStyle='#4daaff';cx.font='bold 11px Nunito,sans-serif';
    cx.fillText('💎'+e.gems,e.x,e.y-sz-38);
  }
}

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16);
  return`rgb(${Math.min(255,(n>>16)+amt)},${Math.min(255,((n>>8)&255)+amt)},${Math.min(255,(n&255)+amt)})`;
}

// ── MINIMAP ──
function drawMinimap(){
  if(!gs)return;
  mx2.clearRect(0,0,80,80);
  const sx=80/(MW*TW),sy=80/(MH*TW);
  for(let ty=0;ty<MH;ty++)for(let tx=0;tx<MW;tx++){
    const t=gs.map[ty][tx];
    mx2.fillStyle=t===0?'#336e15':t===1?'#7a5200':'#2a2a2a';
    mx2.fillRect(tx*TW*sx,ty*TW*sy,TW*sx+.5,TW*sy+.5);
  }
  if(gs.mode==='gem')gs.gems.filter(g=>g.alive).forEach(g=>{
    mx2.fillStyle='#4daaff';mx2.beginPath();mx2.arc(g.x*sx,g.y*sy,2,0,Math.PI*2);mx2.fill();
  });
  if(gs.mode==='ball'&&gs.ball){
    mx2.fillStyle='#fff';mx2.beginPath();mx2.arc(gs.ball.x*sx,gs.ball.y*sy,3,0,Math.PI*2);mx2.fill();
  }
  [...gs.bots,gs.player].filter(e=>e.isAlive).forEach(e=>{
    mx2.fillStyle=e===gs.player?'#ffe234':(e.team===0?'#5dade2':'#e74c3c');
    mx2.beginPath();mx2.arc(e.x*sx,e.y*sy,3,0,Math.PI*2);mx2.fill();
  });
}

// ── UI ──
function updateHpBar(){
  if(!gs)return;
  const p=gs.player,r=p.hp/p.mhp;
  const bar=document.getElementById('hpBar');
  bar.style.width=(r*100)+'%';
  bar.style.background=r>.5?'linear-gradient(90deg,#00c851,#00ff66)':r>.25?'linear-gradient(90deg,#ffb900,#ffd700)':'linear-gradient(90deg,#ff3d3d,#ff6b6b)';
}

function updateAmmoUI(){
  if(!gs)return;
  const a=gs.player.ammo;
  for(let i=0;i<3;i++){const el=document.getElementById('a'+i);if(el)el.className='ap'+(i<a?' on':'');}
}

function updateScore(){
  if(!gs)return;
  if(gs.mode==='ball'){
    document.getElementById('sBlue').textContent='⚽'.repeat(gs.score[0])||'0';
    document.getElementById('sRed').textContent='⚽'.repeat(gs.score[1])||'0';
  } else {
    document.getElementById('sBlue').textContent=gs.score[0];
    document.getElementById('sRed').textContent=gs.score[1];
  }
}

function addKillFeed(kid,victim){
  const kf=document.getElementById('kf');
  const killer=kid===0?gs.player:gs.bots.find(b=>b.id===kid);
  const kn=killer?killer.name:'???';
  const kc=killer?killer.col:'#fff';
  const div=document.createElement('div');div.className='kfe';
  div.innerHTML=`<span style="color:${kc}">${kn}</span> 💀 <span style="color:#e74c3c">${victim.name}</span>`;
  kf.appendChild(div);setTimeout(()=>div.remove(),3000);
}

function showNotif(txt,col='#ffe234'){
  const el=document.getElementById('notif');
  el.textContent=txt;el.style.borderTopColor=col;
  el.className='notif show';setTimeout(()=>el.className='notif',2300);
}

function spawnHit(x,y,col){
  if(!gs)return;
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*2.5;
    gs.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col,sz:2.5+Math.random()*2.5,life:14,ml:14});
  }
}

function spawnDmgNum(wx,wy){
  if(!gs)return;
  const div=document.createElement('div');
  div.style.cssText=`position:absolute;font-family:'Lilita One',cursive;font-size:18px;color:#ffe234;pointer-events:none;z-index:40;text-shadow:0 2px 4px #000;animation:dmgf .9s ease-out forwards;`;
  const p=gs.player;
  const camX=p.x-cv.width/2,camY=p.y-cv.height/2;
  div.style.left=(wx-camX-10)+'px';div.style.top=(wy-camY-20)+'px';
  div.textContent='💥';
  if(!document.getElementById('dss')){
    const st=document.createElement('style');st.id='dss';
    st.textContent='@keyframes dmgf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}';
    document.head.appendChild(st);
  }
  document.getElementById('gameScreen').appendChild(div);
  setTimeout(()=>div.remove(),900);
}
</script>
